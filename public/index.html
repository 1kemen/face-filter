<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>페필이는어레인지마스터 v1.0</title>
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💧</text></svg>">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React, ReactDOM, Prop-Types (Required for Recharts UMD) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone@7.29.1/babel.min.js"></script>
    <!-- Recharts -->
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@0.574.0/dist/umd/lucide.min.js"></script>
    <!-- Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked@15.0.12/marked.min.js"></script>
    <!-- DOMPurify for sanitizing HTML -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.11/dist/purify.min.js"></script>
    <!-- Custom Stylesheet -->
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // Recharts와 React가 글로벌 객체로 정상 로드되었는지 확인 후 구조 분해 할당
        const { useState, useMemo, useRef, useEffect } = React;

        // 아이콘 컴포넌트 (Lucide 아이콘 로드 안정화)
        const Icon = ({ name, className }) => {
            // App 컴포넌트의 useEffect에서 createIcons()를 호출하므로, 여기서는 아이콘 태그만 반환합니다.
            // 이를 통해 불필요한 중복 호출을 방지하고 코드를 단순화합니다.
            return <i data-lucide={name} className={className}></i>;
        };

        const PIE_COLORS = ['#8884d8', '#82ca9d', '#ffc658', '#ff8042', '#0088FE', '#00C49F', '#FFBB28', '#FF8042', '#a4de6c', '#d0ed57', '#ffc658'];

        // 페필이 마스코트 이미지 컴포넌트
        const PepilyIcon = ({ size = 24, style = {} }) => (
            <img src="/pepily.png" width={size} height={size} style={{ objectFit: 'contain', ...style }} alt="페필이" />
        );

        // 신장 보정 제외 항목 (신장과 무관한 부위)
        const HEIGHT_EXCLUDED = ['겨드랑이', '브라질리언'];

        const formatTime = (seconds) => {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            if (m === 0) return `${s}초`;
            return s === 0 ? `${m}분` : `${m}분 ${s}초`;
        };

        const calculateInjectionTime = (item, doctor) => {
            const rawSec = item.baseTimeSec * doctor.injection;
            return Math.round(rawSec / 10) * 10;
        };

        // 의료진별 시술 시간 계산 함수 (독립 함수로 분리)
        const calculateTime = (item, doctor, heightAdjustSec = 0) => {
            // A대표원장님 피크타임 얼굴전체는 1분 20초(80초)로 고정
            if (doctor.id === 'A_peak' && item.name === '얼굴전체') {
                return 80;
            }
            // 각 데이터에 'type'을 명시하여 더 효율적으로 계수를 찾습니다.
            const coefficient = item.type === 'face' ? doctor.face : doctor.body;
            const rawTime = item.time * coefficient;
            let result = Math.round(rawTime / 10) * 10;
            // 바디 시술 + 제외 항목이 아닌 경우에만 신장 보정 적용
            if (item.type === 'body' && !HEIGHT_EXCLUDED.includes(item.name) && heightAdjustSec !== 0) {
                result = Math.max(0, result + heightAdjustSec);
            }
            return result;
        };

        // 대화 내용 내보내기 함수
        const handleExportChat = (messages) => {
            // 첫 인사말만 있는 경우 저장하지 않음
            if (messages.length <= 1) {
                alert('저장할 대화 내용이 없습니다.');
                return;
            }

            // 파일명에 사용할 현재 날짜와 시간
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const filename = `pepily-chat-log-${year}${month}${day}-${hours}${minutes}.txt`;

            // 대화 내용을 텍스트 형식으로 변환
            let chatContent = `병원 운영 AI 매니저 '페필이' 대화 기록\n`;
            chatContent += `저장 일시: ${year}-${month}-${day} ${hours}:${minutes}\n`;
            chatContent += "========================================\n\n";

            messages.forEach(msg => {
                const role = msg.role === 'user' ? '사용자' : '페필이';
                chatContent += `[${role}]\n${msg.text}\n\n----------------------------------------\n\n`;
            });

            // Blob을 생성하여 파일 다운로드 트리거
            const blob = new Blob([chatContent], { type: 'text/plain;charset=utf-8' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(link.href);
        };

        function App() {
            // 라이브러리 로드 후 컴포넌트 할당 (안정성 강화)
            const { 
                BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, 
                ComposedChart, Legend
            } = window.Recharts || {};

            // --- 상태 관리 ---
            const [activeTab, setActiveTab] = useState('genmac');
            const [appData, setAppData] = useState(null); // 분리된 데이터를 저장할 상태
            const [isDataLoading, setIsDataLoading] = useState(true); // 데이터 로딩 상태
            const [dataError, setDataError] = useState(null); // 데이터 로딩 에러 상태
            const [messages, setMessages] = useState([
                { role: 'model', text: '안녕하세요! 병원 운영 AI 매니저 페필이입니다. ✨\n무엇을 도와드릴까요?' }
            ]);
            const [selectedDoctors, setSelectedDoctors] = useState([]); // 의료진 필터링 상태
            const [gender, setGender] = useState('male'); // 성별 (신장 보정용)
            const [patientHeight, setPatientHeight] = useState(174); // 환자 신장 (cm)
            const [openSections, setOpenSections] = useState({ face: true, body: true, chart: false }); // 아코디언 상태
            const [input, setInput] = useState('');
            const [isLoading, setIsLoading] = useState(false); // AI 답변 로딩 상태
            const [showCredits, setShowCredits] = useState(false); // 이스터에그 크레딧
            const messagesEndRef = useRef(null);

            // --- 데이터 로딩 ---
            useEffect(() => {
                async function loadData() {
                    // 사용자가 파일을 직접 열었는지 확인하여 혼란을 방지합니다.
                    if (window.location.protocol === 'file:') {
                        setDataError("잘못된 방식으로 파일을 열었습니다. 'node server.js'를 실행한 후, 웹 브라우저에서 'http://localhost:3001' 주소로 접속해주세요.");
                        setIsDataLoading(false);
                        return;
                    }

                    try {
                        // 이제 모든 데이터는 단일 API 엔드포인트를 통해 가져옵니다.
                        const response = await fetch('/api/get-data');

                        // 서버가 데이터 파일을 제대로 보내줬는지 확인합니다.
                        if (!response.ok) {
                            throw new Error("서버에서 데이터 파일을 가져오는 데 실패했습니다. 서버가 실행 중인지 확인해주세요.");
                        }

                        const appData = await response.json();

                        // API에서 받은 데이터로 상태를 설정합니다.
                        setSelectedDoctors(appData.doctorProfiles.map(d => d.id));
                        setAppData(appData);
                    } catch (error) {
                        console.error("데이터 로딩 실패:", error);
                        setDataError(error.message || "애플리케이션 데이터를 불러오는 데 실패했습니다. 네트워크 연결을 확인하고 페이지를 새로고침 해주세요.");
                    } finally {
                        setIsDataLoading(false);
                    }
                }
                loadData();
            }, []);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [activeTab, appData]);

            useEffect(() => {
                messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [messages]);

            const toggleSection = (section) => {
                setOpenSections(prev => ({ ...prev, [section]: !prev[section] }));
            };

            const handleGenderChange = (newGender) => {
                setGender(newGender);
                setPatientHeight(newGender === 'male' ? 174 : 163);
            };

            // 신장 보정값 계산 (±5cm당 ±30초)
            const baseHeight = gender === 'male' ? 174 : 163;
            const heightAdjustSec = Math.round((patientHeight - baseHeight) / 5) * 30;

            const handleDoctorToggle = (doctorId) => {
                setSelectedDoctors(prev =>
                    prev.includes(doctorId)
                        ? prev.filter(id => id !== doctorId)
                        : [...prev, doctorId]
                );
            };

            const filteredDoctors = useMemo(() => {
                if (!appData) return [];
                return appData.doctorProfiles.filter(doc => selectedDoctors.includes(doc.id));
            }, [appData, selectedDoctors]);

            const chartData = useMemo(() => {
                if (!appData) return [];
                const allProcedures = [...appData.faceLaserData, ...appData.bodyLaserData];
                return allProcedures.map(item => {
                    const procedureTimes = { name: item.name };
                    filteredDoctors.forEach(doc => {
                        procedureTimes[doc.id] = calculateTime(item, doc, heightAdjustSec);
                    });
                    return procedureTimes;
                });
            }, [appData, selectedDoctors, heightAdjustSec]);

            const injectionChartData = useMemo(() => {
                if (!appData || !appData.injectionData) return [];
                return appData.injectionData.map(item => {
                    const procedureTimes = { name: item.name };
                    filteredDoctors.forEach(doc => {
                        procedureTimes[doc.id] = calculateInjectionTime(item, doc);
                    });
                    return procedureTimes;
                });
            }, [appData, selectedDoctors]);

            const handleSendMessage = async () => {
                if (!input.trim() || !appData) return;

                // 🌿 이스터에그: 홍삼캔디
                if (input.trim() === '홍삼캔디') {
                    setMessages(prev => [...prev, { role: 'user', text: input }]);
                    setInput('');
                    setShowCredits(true);
                    return;
                }

                const userMessage = { role: 'user', text: input };
                const updatedMessages = [...messages, userMessage];
                setMessages(updatedMessages);
                setInput('');
                setIsLoading(true);

                try {
                    // API는 대화 기록이 'user'로 시작해야 합니다.
                    // 화면에 표시되는 초기 인사 메시지(model)를 API 요청에서는 제외합니다.
                    const historyForApi = updatedMessages.filter((msg, index) => !(index === 0 && msg.role === 'model'));

                    // 대화 기록을 OpenAI API 형식에 맞게 변환합니다. (role: 'model' -> 'assistant', text -> content)
                    const apiConversationHistory = historyForApi.map(msg => ({
                        role: msg.role === 'model' ? 'assistant' : 'user',
                        content: msg.text
                    }));

                    // Vercel 배포 환경과 로컬 환경 모두에서 작동하는 상대 경로를 사용합니다.
                    const response = await fetch('/api/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            messages: apiConversationHistory
                        })
                    });

                    // 서버가 500 에러 등 비정상 응답을 보냈는지 확인합니다.
                    if (!response.ok) {
                        // 서버가 보낸 JSON 에러 메시지를 우선적으로 사용합니다.
                        const errorData = await response.json().catch(() => null);
                        const serverMessage = errorData?.response || `서버에서 오류가 발생했습니다 (상태 코드: ${response.status}).`;
                        throw new Error(serverMessage);
                    }

                    const data = await response.json();
                    const aiText = data.response || "답변을 가져오지 못했습니다.";
                    setMessages(prev => [...prev, { role: 'model', text: aiText }]);
                } catch (e) {
                    console.error("An error occurred in handleSendMessage:", e); // 디버깅을 위한 전체 에러 로그
                    // 오류의 종류에 따라 더 구체적인 메시지를 표시합니다.
                    const errorMessage = e.message.includes('Failed to fetch') 
                        ? "서버에 연결할 수 없습니다. 'node server.js'가 실행 중인지 확인해주세요."
                        : e.message;
                    setMessages(prev => [...prev, { role: 'model', text: `오류: ${errorMessage}` }]);
                } finally {
                    setIsLoading(false);
                }
            };

            // 데이터 로딩 중일 때 로딩 화면 표시
            if (isDataLoading) {
                return <div className="p-8 text-center text-slate-500">데이터를 불러오는 중입니다...</div>;
            }

            // 데이터 로딩 실패 시 에러 메시지 표시
            if (dataError) {
                return <div className="p-8 text-center text-red-500">{dataError}</div>;
            }

            // 차트 라이브러리가 로드되지 않았을 경우 에러 메시지 표시
            if (!BarChart) {
                return <div className="p-8 text-center text-red-500">오류: 차트 라이브러리를 불러오지 못했습니다. 페이지를 새로고침 해주세요.</div>;
            }

            return (
                <div className="p-4 md:p-8 max-w-7xl mx-auto">

                    {/* 🌿 엔딩 크레딧 오버레이 */}
                    {showCredits && (
                        <div className="credits-overlay" onClick={() => setShowCredits(false)}>
                            <div className="credits-close-hint">화면을 터치하면 닫힙니다</div>
                            <div className="credits-roll">
                                <div style={{height:'100vh'}} />

                                {/* 홍삼캔디 효능 학술 텍스트 */}
                                <div style={{fontSize:'0.7rem', color:'rgba(255,255,255,0.25)', letterSpacing:'0.12em', textTransform:'uppercase', marginBottom:'1.2rem'}}>Notice · 고지사항</div>
                                <div style={{fontSize:'0.82rem', color:'rgba(255,255,255,0.5)', lineHeight:2.1, textAlign:'left', maxWidth:'420px', margin:'0 auto 0.5rem'}}>
                                    <span style={{display:'block', fontWeight:700, color:'rgba(255,255,255,0.65)', marginBottom:'0.6rem', textAlign:'center', fontSize:'0.85rem'}}>
                                        홍삼캔디(紅蔘캔디)의 효능에 관한 소고(小考)
                                    </span>
                                    홍삼(<em>Panax ginseng</em> C.A.Meyer)은 수삼을 증삼(蒸蔘) 및 건조 공정을 거쳐 제조된 가공 인삼으로, 그 주요 유효 성분인 진세노사이드(ginsenoside) 계열 화합물—특히 Rg1, Rb1, Rc, Rb2, Rd 등—이 면역 조절, 피로 회복, 항산화 활성 및 혈행 개선 등 다양한 생리적 기전에 관여함이 다수의 임상·비임상 연구를 통해 보고된 바 있다.<br/><br/>
                                    본 제품 '홍삼캔디'는 전술한 홍삼 농축액을 적정 비율로 함유하되, 기호식품으로서의 관능적 속성을 최적화하기 위해 당류 및 향미 성분과 배합된 형태로 제조된다. 이는 Maillard 반응을 통한 갈변 생성물의 형성을 최소화하는 동시에, 진세노사이드의 생체이용률(bioavailability)을 유지하는 방향으로 공정이 설계된 것으로 이해할 수 있다.<br/><br/>
                                    다만, 「식품위생법」 제13조 및 관련 고시에 의거하여, 질병의 예방 또는 치료에 효능·효과가 있다는 표현은 법적으로 허용되지 않음을 명기하는 바이며, 본 고(稿)의 내용은 어디까지나 학술적 참고 목적에 한하며 실제 의학적 조언을 대체하지 아니함을 재차 강조하는 바이다.
                                </div>
                                <div style={{fontSize:'0.65rem', color:'rgba(255,255,255,0.18)', marginTop:'1rem', marginBottom:'3rem', fontStyle:'italic'}}>
                                    ※ 솔직히 이 텍스트를 끝까지 읽을 줄은 몰랐습니다.
                                </div>

                                <div className="credits-divider" />
                                <div style={{height:'2rem'}} />

                                <PepilyIcon size={73} style={{marginBottom:'1rem', opacity:0.9}} />
                                <div className="credits-title">페필이는어레인지마스터</div>
                                <div className="credits-ver">V 1 . 0</div>

                                <div className="credits-divider" />

                                <div className="credits-section">개발 비화</div>
                                <div style={{fontSize:'0.85rem', color:'rgba(255,255,255,0.5)', marginBottom:'0.5rem'}}>열람 등급: 관계자 외 비공개</div>
                                <div style={{fontSize:'0.9rem', color:'rgba(255,255,255,0.65)', lineHeight:2}}>
                                    2026년 2월 14일<br/>
                                    발렌타인데이에 태어났습니다.<br/>
                                    초콜릿 대신 API 키로 시작된<br/>
                                    4일간의 기록.
                                </div>

                                <div className="credits-divider" />

                                <div className="credits-section">Staff</div>

                                <div className="credits-role">기획 · 아이디어 · 무한 피드백</div>
                                <div className="credits-name">홍삼아저씨</div>

                                <div className="credits-role">코드제안 · 새벽 응답 · 기억상실</div>
                                <div className="credits-name">페필이 (AI)</div>

                                <div className="credits-divider" />

                                <div className="credits-section">Production Stats</div>

                                <div className="credits-stat-label">⏱ 개발 기간</div>
                                <div className="credits-stat-value">총 21시간<br/><span style={{fontSize:'0.8rem', color:'rgba(255,255,255,0.4)'}}>1,260분 / 75,600초</span></div>

                                <div className="credits-stat-label">💬 대화 횟수</div>
                                <div className="credits-stat-value">셀 수 없음</div>

                                <div className="credits-stat-label">🐛 잡은 버그</div>
                                <div className="credits-stat-value" style={{fontSize:'0.85rem'}}>구글 시트 리다이렉트<br/>차트 클리핑<br/>채팅창 overflow</div>

                                <div className="credits-stat-label">💸 총 투입 비용</div>
                                <div className="credits-stat-value">10두쫀쿠<br/><span style={{fontSize:'0.75rem', color:'rgba(255,255,255,0.4)'}}>api 토큰 겁나 비쌈ㅠㅠ (₩70,000)<br/>홍삼캔디 600개 분량</span></div>

                                <div className="credits-stat-label">🚬 핀 담배</div>
                                <div className="credits-stat-value">두 갑</div>

                                <div className="credits-stat-label">☕ 마신 커피</div>
